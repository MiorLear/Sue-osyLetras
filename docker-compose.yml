services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-explorarte}
      POSTGRES_USER: ${POSTGRES_USER:-explorarte}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-explorarte_dev_password}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-explorarte}"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ./api
      target: dev
    ports:
      - "${API_PORT:-8000}:8000"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/${POSTGRES_DB:-explorarte}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-explorarte}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-explorarte_dev_password}
      # Si DATABASE_URL está definido en .env, el backend lo traduce y tiene
      # PRECEDENCIA sobre los SPRING_DATASOURCE_* de arriba — así el stack local
      # apunta a Supabase. Si está vacío, se usa el Postgres de Docker (servicio db).
      DATABASE_URL: ${DATABASE_URL:-}
      JWT_SECRET: ${JWT_SECRET:-dev-only-not-for-production-change-me}
      JWT_EXPIRATION_MINUTES: ${JWT_EXPIRATION_MINUTES:-1440}
      SEED_USER_PASSWORD: ${SEED_USER_PASSWORD:-explorarte123}
      APP_CORS_ALLOWED_ORIGINS: ${APP_CORS_ALLOWED_ORIGINS:-http://localhost:5173,http://localhost:8081,http://localhost:19006}
      # Supabase Storage — subida de archivos (fotos/videos/documentos).
      SUPABASE_URL: ${SUPABASE_URL:-}
      SUPABASE_KEY: ${SUPABASE_KEY:-}
    volumes:
      - ./api/src:/app/src
      - api_target:/app/target
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 60s

  web:
    image: node:20-alpine
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host"
    ports:
      - "${WEB_PORT:-5173}:5173"
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://localhost:8000}
      VITE_API_MOCK_MODULES: ${VITE_API_MOCK_MODULES:-}
    volumes:
      - ./web:/app
      # web/vite.config.ts aliases @explorarte/shared to ../shared/src (relative
      # to web/) for live dev without a separate build step — mount the sibling
      # folder at the matching path inside the container so that resolves.
      - ./shared:/shared
      - web_node_modules:/app/node_modules
    depends_on:
      api:
        condition: service_started

volumes:
  pgdata:
  api_target:
  web_node_modules:
