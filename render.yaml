# Render Blueprint — ExplorArte (Sueños y Letras)
# Despliega DOS sitios estáticos (web y la vista web de mobile), ambos
# apuntando a la API real vía VITE_API_URL/EXPO_PUBLIC_API_URL, MÁS el backend
# real: la API en Java (Spring Boot, mismo Dockerfile que usa docker-compose
# localmente) contra una base de datos Postgres persistente en Supabase.
#
# Para publicar: en Render → New → Blueprint → conecta este repo.
# Render detecta este archivo y crea todo automáticamente.
#
# Plan gratuito — limitaciones a tener en cuenta:
#   - El servicio web (API) se "duerme" tras 15 min sin tráfico; el primer
#     request después de eso tarda ~30-60s en responder (cold start).
#
# La base de datos YA NO es la Postgres gratuita de Render (que expiraba cada
# 30 días) — es un proyecto Supabase Postgres persistente. DATABASE_URL debe
# configurarse manualmente en el dashboard de Render con la cadena de conexión
# del "Session pooler" de Supabase (Project Settings → Database), no la del
# host directo (IPv6-only, no compatible con la red de Render). Igual para
# SUPABASE_URL / SUPABASE_SERVICE_ROLE_KEY (Project Settings → API), usados
# para subir archivos a Supabase Storage.
services:
  # --- API real en Java (Spring Boot) — mismo Dockerfile que docker-compose ---
  - type: web
    name: explorarte-api
    runtime: docker
    plan: free
    dockerfilePath: ./api/Dockerfile
    dockerContext: ./api
    healthCheckPath: /actuator/health
    envVars:
      # Configurar manualmente en el dashboard de Render: cadena de conexión
      # del Session pooler de Supabase (postgresql://postgres.<ref>:[PASSWORD]@aws-0-<region>.pooler.supabase.com:5432/postgres).
      - key: DATABASE_URL
        sync: false
      - key: SUPABASE_URL
        value: https://whwczhxwhowtqdfvcavv.supabase.co
      # Configurar manualmente: la service_role key (Project Settings → API,
      # recomendada) o la anon key. Se deja como secreto y no se versiona.
      - key: SUPABASE_KEY
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRATION_MINUTES
        value: "1440"
      # Contraseña de las cuentas de ejemplo en este backend compartido de
      # equipo — documentada en COMO-EMPEZAR.md, no es un secreto real.
      - key: SEED_USER_PASSWORD
        value: explorarte-team-2026
      - key: APP_CORS_ALLOWED_ORIGINS
        value: https://explorarte-web.onrender.com,http://localhost:5173,http://localhost:8081,http://localhost:19006
      # Envío de correo (recuperar contraseña) vía Resend. Configurar la key
      # manualmente en el dashboard (secreto, no se versiona).
      - key: RESEND_API_KEY
        sync: false
      # Cambiar a una dirección de un dominio VERIFICADO en Resend para poder
      # enviar a cualquier docente. Con onboarding@resend.dev solo llega a tu
      # propio correo de la cuenta de Resend.
      - key: RESEND_FROM
        value: Sueños y Letras <onboarding@resend.dev>
      # AUTH_DEV_OTP_CODE se deja SIN definir en producción: no hay código fijo.


  # --- Demo WEB (escritorio) — Vite + React, carpeta /web ---
  - type: web
    name: explorarte-web
    runtime: static
    rootDir: web
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    pullRequestPreviewsEnabled: true
    envVars:
      - key: NODE_VERSION
        value: "20"
      # Apunta la build de producción a la API real desplegada, para que deje
      # de correr en modo mock (usingMock queda en true si esto no está seteado).
      - key: VITE_API_URL
        value: https://explorarte-api.onrender.com
    routes:
      # Fallback SPA: las rutas sin archivo estático van a index.html
      # (React Router resuelve la navegación del lado del cliente).
      - type: rewrite
        source: /*
        destination: /index.html
    headers:
      - path: /*
        name: X-Frame-Options
        value: SAMEORIGIN

  # --- Demo MOBILE (vista de móvil en el navegador) — Expo web export ---
  - type: web
    name: explorarte-mobile
    runtime: static
    rootDir: .
    buildCommand: npm install && npx expo export -p web
    staticPublishPath: ./dist
    pullRequestPreviewsEnabled: true
    envVars:
      - key: NODE_VERSION
        value: "20"
      # Mismo motivo que VITE_API_URL arriba — sin esto, esta demo web también
      # corre en modo mock.
      - key: EXPO_PUBLIC_API_URL
        value: https://explorarte-api.onrender.com
    routes:
      # Expo prerenderiza un .html por ruta; este rewrite solo actúa como
      # fallback para deep-links de rutas dinámicas (p. ej. /emociones/:id).
      - type: rewrite
        source: /*
        destination: /index.html
