<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<div style="position:absolute; inset:0; display:flex; flex-direction:column; background:#F5FEFE; font-family:'Nunito',sans-serif; overflow:hidden;">

  <sc-if value="{{ showBack }}" hint-placeholder-val="{{ false }}">
    <div style="padding:40px 20px 8px;">
      <button onClick="{{ back }}" style="display:flex; align-items:center; gap:6px; background:none; border:none; cursor:pointer; color:#4A6E6B; font-size:0.8rem; font-weight:600;">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m12 19-7-7 7-7"/><path d="M19 12H5"/></svg>
        Volver
      </button>
    </div>
  </sc-if>

  <div style="{{ logoStyle }}">
    <div style="background:#fff; border-radius:16px; padding:8px; box-shadow:0 1px 3px rgba(0,0,0,.1); margin-bottom:12px; border:1px solid #E0F5F3;">
      <img src="assets/logo.jpg" alt="Sueños y Letras" style="width:56px; height:56px; border-radius:12px; object-fit:cover; display:block;">
    </div>
    <h1 style="margin:0; font-size:1.3rem; font-weight:800; color:#1A3A38; text-align:center;">{{ title }}</h1>
    <p style="margin:4px 0 0; font-size:0.78rem; color:#717182; text-align:center;">{{ subtitle }}</p>
  </div>

  <div class="sl-scroll" style="flex:1; overflow-y:auto; padding:0 20px; display:flex; flex-direction:column; gap:12px;">

    <!-- MAIN -->
    <sc-if value="{{ isMain }}" hint-placeholder-val="{{ true }}">
      <button class="sl-press2" onClick="{{ handleLogin }}" style="width:100%; display:flex; align-items:center; justify-content:center; gap:12px; padding:14px; border-radius:12px; background:#fff; cursor:pointer; border:1.5px solid #E0F0EF;">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
        <span style="font-size:0.85rem; font-weight:700; color:#1A3A38;">Continuar con Google</span>
      </button>

      <button class="sl-press2" onClick="{{ toPhone }}" style="width:100%; display:flex; align-items:center; justify-content:center; gap:12px; padding:14px; border-radius:12px; background:#fff; cursor:pointer; border:1.5px solid #E0F0EF;">
        <span style="width:24px; height:24px; border-radius:50%; display:flex; align-items:center; justify-content:center; background:#7C3AED;">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
        </span>
        <span style="font-size:0.85rem; font-weight:700; color:#1A3A38;">Continuar con teléfono</span>
      </button>

      <div style="display:flex; align-items:center; gap:12px; padding:4px 0;">
        <div style="flex:1; height:1px; background:#D0ECEB;"></div>
        <span style="font-size:0.72rem; color:#717182;">o con correo</span>
        <div style="flex:1; height:1px; background:#D0ECEB;"></div>
      </div>

      <div>
        <p style="margin:0 0 6px; font-size:0.78rem; font-weight:700; color:#1A3A38;">Correo electrónico</p>
        <div style="position:relative; display:flex; align-items:center;">
          <span style="position:absolute; left:14px; pointer-events:none; display:flex;"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#717182" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="20" height="16" x="2" y="4" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg></span>
          <input class="sl-input" type="email" placeholder="correo@ejemplo.com" value="{{ email }}" onChange="{{ onEmail }}" style="width:100%; padding:12px 16px 12px 40px; border-radius:12px; outline:none; font-size:0.82rem; color:#1A3A38;">
        </div>
      </div>

      <div>
        <p style="margin:0 0 6px; font-size:0.78rem; font-weight:700; color:#1A3A38;">Contraseña</p>
        <div style="position:relative; display:flex; align-items:center;">
          <input class="sl-input" type="{{ passType }}" placeholder="Tu contraseña" value="{{ password }}" onChange="{{ onPassword }}" style="width:100%; padding:12px 45px 12px 16px; border-radius:12px; outline:none; font-size:0.82rem; color:#1A3A38;">
          <button type="button" onClick="{{ toggleShowPass }}" style="position:absolute; right:12px; background:none; border:none; cursor:pointer; color:#717182; display:flex;">
            <sc-if value="{{ showPass }}" hint-placeholder-val="{{ false }}">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10.733 5.076a10.744 10.744 0 0 1 11.205 6.575 1 1 0 0 1 0 .696 10.747 10.747 0 0 1-1.444 2.49"/><path d="M14.084 14.158a3 3 0 0 1-4.242-4.242"/><path d="M17.479 17.499a10.75 10.75 0 0 1-15.417-5.151 1 1 0 0 1 0-.696 10.75 10.75 0 0 1 4.446-5.143"/><path d="m2 2 20 20"/></svg>
            </sc-if>
            <sc-if value="{{ showPassOff }}" hint-placeholder-val="{{ true }}">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2.062 12.348a1 1 0 0 1 0-.696 10.75 10.75 0 0 1 19.876 0 1 1 0 0 1 0 .696 10.75 10.75 0 0 1-19.876 0"/><circle cx="12" cy="12" r="3"/></svg>
            </sc-if>
          </button>
        </div>
        <div style="display:flex; justify-content:flex-end; margin-top:6px;">
          <button onClick="{{ goForgot }}" style="font-size:0.72rem; color:#3DBFB8; font-weight:600; background:none; border:none; cursor:pointer;">¿Olvidaste tu contraseña?</button>
        </div>
      </div>

      <button class="sl-press2" onClick="{{ handleLogin }}" disabled="{{ loginDisabled }}" style="{{ loginBtnStyle }}">Iniciar sesión</button>
    </sc-if>

    <!-- PHONE NUMBER -->
    <sc-if value="{{ isPhoneNum }}" hint-placeholder-val="{{ false }}">
      <div>
        <p style="margin:0 0 6px; font-size:0.78rem; font-weight:700; color:#1A3A38;">Número de teléfono</p>
        <div style="position:relative; display:flex; align-items:center;">
          <span style="position:absolute; left:14px; pointer-events:none; display:flex;"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#717182" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/></svg></span>
          <input class="sl-input" type="tel" placeholder="+502 1234 5678" value="{{ phone }}" onChange="{{ onPhone }}" style="width:100%; padding:12px 16px 12px 40px; border-radius:12px; outline:none; font-size:0.82rem; color:#1A3A38;">
        </div>
      </div>
      <button class="sl-press2" onClick="{{ sendCode }}" disabled="{{ sendDisabled }}" style="{{ sendBtnStyle }}">Enviar código</button>
    </sc-if>

    <!-- OTP -->
    <sc-if value="{{ isPhoneOtp }}" hint-placeholder-val="{{ false }}">
      <div style="border-radius:16px; padding:16px; text-align:center; background:#E8F8F7; border:1px solid #C0E8E5;">
        <p style="margin:0; font-size:0.78rem; color:#4A6E6B;">Código enviado a</p>
        <p style="margin:0; font-size:0.88rem; font-weight:700; color:#1A3A38;">{{ phone }}</p>
      </div>
      <div>
        <p style="margin:0 0 8px; font-size:0.78rem; font-weight:700; color:#1A3A38;">Código de 6 dígitos</p>
        <input type="tel" inputMode="numeric" maxLength="6" placeholder="• • • • • •" value="{{ otp }}" onChange="{{ onOtp }}" style="{{ otpStyle }}">
      </div>
      <button class="sl-press2" onClick="{{ handleLogin }}" disabled="{{ verifyDisabled }}" style="{{ verifyBtnStyle }}">Verificar e iniciar sesión</button>
      <button onClick="{{ backToPhoneNum }}" style="width:100%; text-align:center; padding:8px; font-size:0.78rem; color:#717182; background:none; border:none; cursor:pointer;">¿No recibiste el código? <span style="color:#3DBFB8; font-weight:700;">Reenviar</span></button>
    </sc-if>

    <div style="height:8px;"></div>
  </div>

  <sc-if value="{{ isMain }}" hint-placeholder-val="{{ true }}">
    <div style="padding:24px 20px; text-align:center;">
      <p style="margin:0; font-size:0.78rem; color:#717182;">¿No tienes cuenta? <button onClick="{{ goRegister }}" style="color:#3DBFB8; font-weight:700; background:none; border:none; cursor:pointer; font-size:0.78rem;">Registrarse</button></p>
    </div>
  </sc-if>

</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:390,&quot;height&quot;:844},&quot;navigate&quot;:{&quot;editor&quot;:null,&quot;tsType&quot;:&quot;(to: string | number) =&gt; void&quot;}}">
class Component extends DCLogic {
  state = { view: "main", showPass: false, email: "", password: "", phone: "", otp: "" };

  set(k) { return (e) => this.setState({ [k]: (e && e.target) ? e.target.value : e }); }
  onOtp = (e) => this.setState({ otp: (e.target.value || "").replace(/\D/g, "").slice(0, 6) });
  view(v) { return () => this.setState({ view: v }); }

  renderVals() {
    const nav = this.props.navigate || (() => {});
    const s = this.state;
    const showBack = s.view !== "main";
    const titles = { "main": "Bienvenida de nuevo", "phone-number": "Ingresa tu teléfono", "phone-otp": "Verificar número" };
    const subs = { "main": "Sueños y Letras · más letras, más libres", "phone-number": "Te enviaremos un código de 6 dígitos", "phone-otp": "Código enviado a " + s.phone };
    const grad = "linear-gradient(90deg,#3DBFB8,#2A9A95)";
    const btn = (disabled) => ({ width: "100%", padding: "14px", borderRadius: 12, color: "#fff", border: "none", fontSize: "0.88rem", fontWeight: 700, cursor: disabled ? "not-allowed" : "pointer", background: disabled ? "#B0D8D6" : grad });
    const loginDisabled = !s.email || !s.password;
    const sendDisabled = s.phone.length < 8;
    const verifyDisabled = s.otp.length < 6;
    return {
      isMain: s.view === "main", isPhoneNum: s.view === "phone-number", isPhoneOtp: s.view === "phone-otp",
      showBack,
      logoStyle: { display: "flex", flexDirection: "column", alignItems: "center", padding: (showBack ? "16px" : "48px") + " 24px 0", marginBottom: 24 },
      title: titles[s.view], subtitle: subs[s.view],
      email: s.email, password: s.password, phone: s.phone, otp: s.otp,
      onEmail: this.set("email"), onPassword: this.set("password"), onPhone: this.set("phone"), onOtp: this.onOtp,
      showPass: s.showPass, showPassOff: !s.showPass, passType: s.showPass ? "text" : "password",
      toggleShowPass: () => this.setState(p => ({ showPass: !p.showPass })),
      back: this.view("main"), toPhone: this.view("phone-number"), sendCode: this.view("phone-otp"), backToPhoneNum: this.view("phone-number"),
      handleLogin: () => nav("/"), goForgot: () => nav("/forgot-password"), goRegister: () => nav("/register"),
      loginDisabled, loginBtnStyle: btn(loginDisabled),
      sendDisabled, sendBtnStyle: btn(sendDisabled),
      verifyDisabled, verifyBtnStyle: btn(verifyDisabled),
      otpStyle: { width: "100%", padding: "16px 0", borderRadius: 12, outline: "none", textAlign: "center", border: "1.5px solid " + (s.otp.length > 0 ? "#3DBFB8" : "#D0ECEB"), background: "#fff", fontSize: "1.6rem", fontWeight: 800, color: "#1A3A38", letterSpacing: "0.8rem" },
    };
  }
}
</script>
</body>
</html>
