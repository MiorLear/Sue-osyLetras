<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<div style="position:absolute; inset:0; display:flex; flex-direction:column; background:#F5FEFE; font-family:'Nunito',sans-serif; overflow:hidden;">

  <!-- Header -->
  <header style="padding:40px 20px 24px; position:relative; overflow:hidden; flex-shrink:0; background:linear-gradient(135deg,#3DBFB8,#2A9A95);">
    <div style="position:absolute; top:-24px; right:-24px; width:96px; height:96px; border-radius:50%; opacity:.2; background:#fff;"></div>
    <div style="position:absolute; bottom:-16px; left:-16px; width:64px; height:64px; border-radius:50%; opacity:.1; background:#fff;"></div>
    <div style="position:relative; display:flex; align-items:center; gap:12px;">
      <div style="background:#fff; border-radius:16px; padding:6px; box-shadow:0 1px 3px rgba(0,0,0,.12); flex-shrink:0;">
        <img src="assets/logo.jpg" alt="logo" style="width:40px; height:40px; border-radius:12px; object-fit:cover; display:block;">
      </div>
      <div>
        <p style="margin:0; color:rgba(255,255,255,.7); font-size:0.7rem;">Sueños y Letras</p>
        <h1 style="margin:0; color:#fff; font-size:1.15rem; font-weight:800;">Mis Módulos</h1>
      </div>
    </div>
  </header>

  <!-- Module list -->
  <div class="sl-scroll" style="flex:1; overflow-y:auto; padding:16px; display:flex; flex-direction:column; gap:16px;">
    <sc-for list="{{ modules }}" as="m" hint-placeholder-count="4">
      <div style="{{ m.cardStyle }}">
        <div style="{{ m.headerStyle }}">
          <span style="font-size:2.5rem; line-height:1;">{{ m.emoji }}</span>
          <div style="flex:1;">
            <h2 style="margin:0; color:#fff; font-size:1.05rem; font-weight:800;">Módulo de {{ m.name }}</h2>
            <p style="margin:2px 0 0; color:rgba(255,255,255,.85); font-size:0.72rem; line-height:1.4;">{{ m.description }}</p>
          </div>
        </div>
        <div style="padding:12px 16px; display:flex; gap:12px;">
          <div style="{{ m.badgeStyle }}"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7Z"/><path d="M14 2v4a2 2 0 0 0 2 2h4"/><path d="M16 13H8"/><path d="M16 17H8"/><path d="M10 9H8"/></svg><span style="font-size:0.68rem; font-weight:700;">{{ m.pdfsLabel }}</span></div>
          <div style="{{ m.badgeStyle }}"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m22 8-6 4 6 4V8Z"/><rect width="14" height="12" x="2" y="6" rx="2" ry="2"/></svg><span style="font-size:0.68rem; font-weight:700;">{{ m.videosLabel }}</span></div>
          <div style="{{ m.badgeStyle }}"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 14h3a2 2 0 0 1 2 2v3a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-7a9 9 0 0 1 18 0v7a2 2 0 0 1-2 2h-1a2 2 0 0 1-2-2v-3a2 2 0 0 1 2-2h3"/></svg><span style="font-size:0.68rem; font-weight:700;">{{ m.audiosLabel }}</span></div>
        </div>
        <div style="padding:0 16px 16px; display:flex; gap:8px;">
          <button class="sl-press2" onClick="{{ m.onVerMod }}" style="{{ m.verModStyle }}"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 7v14"/><path d="M3 18a1 1 0 0 1-1-1V4a1 1 0 0 1 1-1h5a4 4 0 0 1 4 4 4 4 0 0 1 4-4h5a1 1 0 0 1 1 1v13a1 1 0 0 1-1 1h-6a3 3 0 0 0-3 3 3 3 0 0 0-3-3z"/></svg>Ver módulo</button>
          <button class="sl-press2" onClick="{{ m.onVerForo }}" style="{{ m.verForoStyle }}"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>Ver en Foro</button>
        </div>
      </div>
    </sc-for>
    <div style="height:8px;"></div>
  </div>

  <!-- Bottom Nav -->
  <div style="padding:12px 16px 28px; display:flex; gap:12px; background:#fff; flex-shrink:0; border-top:1px solid #E4F4F3;">
    <button class="sl-press" onClick="{{ goHome }}" style="flex:1; padding:12px; border-radius:16px; display:flex; flex-direction:column; align-items:center; gap:4px; cursor:pointer; background:#E6F8F7; border:1.5px solid rgba(61,191,184,.2);">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#3DBFB8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><path d="M9 22V12h6v10"/></svg>
      <span style="font-size:0.65rem; font-weight:700; color:#1A3A38;">Inicio</span>
    </button>
    <button class="sl-press" onClick="{{ goFaq }}" style="flex:1; padding:12px; border-radius:16px; display:flex; flex-direction:column; align-items:center; gap:4px; cursor:pointer; background:#E6F8F7; border:1.5px solid rgba(61,191,184,.2);">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#3DBFB8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><path d="M12 17h.01"/></svg>
      <span style="font-size:0.65rem; font-weight:700; color:#1A3A38; text-align:center; line-height:1.3;">Preguntas Frecuentes</span>
    </button>
  </div>

</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:390,&quot;height&quot;:844},&quot;navigate&quot;:{&quot;editor&quot;:null,&quot;tsType&quot;:&quot;(to: string | number) =&gt; void&quot;}}">
class Component extends DCLogic {
  renderVals() {
    const nav = this.props.navigate || (() => {});
    const RAW = [
      { id: "felicidad", name: "Felicidad", emoji: "😊", color: "#F0B429", gradient: "linear-gradient(135deg,#FFE77A,#F6C90E)", bg: "#FFFBEB", border: "#FEF08A",
        description: "Exploramos la alegría, la sonrisa y los momentos que nos llenan de felicidad. Los niños aprenden palabras y emociones positivas a través de historias inspiradoras.",
        pdfs: 4, videos: 3, audios: 2 },
      { id: "enojo", name: "Enojo", emoji: "😠", color: "#E53E3E", gradient: "linear-gradient(135deg,#FCA5A5,#EF4444)", bg: "#FFF5F5", border: "#FED7D7",
        description: "Aprendemos a reconocer y canalizar la ira de manera saludable. Los niños descubren que el enojo es una emoción natural que podemos manejar con palabras.",
        pdfs: 3, videos: 2, audios: 3 },
      { id: "desagrado", name: "Desagrado", emoji: "🤢", color: "#38A169", gradient: "linear-gradient(135deg,#86EFAC,#22C55E)", bg: "#F0FFF4", border: "#BBF7D0",
        description: "Exploramos la incomodidad y el rechazo con empatía. Los niños aprenden a expresar lo que no les gusta de forma respetuosa y asertiva.",
        pdfs: 3, videos: 3, audios: 2 },
      { id: "tristeza", name: "Tristeza", emoji: "😢", color: "#4299E1", gradient: "linear-gradient(135deg,#93C5FD,#3B82F6)", bg: "#EBF8FF", border: "#BEE3F8",
        description: "Aprendemos que está bien sentirse triste y cómo encontrar consuelo en las palabras y los libros. La lectura como refugio en momentos difíciles.",
        pdfs: 4, videos: 2, audios: 3 },
    ];
    const badgeBase = { display: "flex", alignItems: "center", gap: 4, padding: "6px 10px", borderRadius: 8 };
    const actBase = { flex: 1, display: "flex", alignItems: "center", justifyContent: "center", gap: 6, padding: "10px", borderRadius: 12, fontSize: "0.78rem", fontWeight: 700, cursor: "pointer" };
    const modules = RAW.map(m => ({
      name: m.name, emoji: m.emoji, description: m.description,
      pdfsLabel: m.pdfs + " PDFs", videosLabel: m.videos + " Videos", audiosLabel: m.audios + " Audios",
      cardStyle: { borderRadius: 16, overflow: "hidden", border: "1.5px solid " + m.border, background: m.bg },
      headerStyle: { padding: "16px", display: "flex", alignItems: "flex-start", gap: 12, background: m.gradient },
      badgeStyle: { ...badgeBase, background: m.color + "15", color: m.color },
      verModStyle: { ...actBase, background: m.color, color: "#fff", border: "none" },
      verForoStyle: { ...actBase, border: "1.5px solid " + m.color, color: m.color, background: "#fff" },
      onVerMod: () => nav("/module/" + m.id),
      onVerForo: () => nav("/foro?module=" + m.id),
    }));
    return { modules, goHome: () => nav("/"), goFaq: () => nav("/faq") };
  }
}
</script>
</body>
</html>
