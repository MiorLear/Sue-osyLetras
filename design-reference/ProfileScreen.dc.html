<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<div style="position:absolute; inset:0; display:flex; flex-direction:column; background:#F5FEFE; font-family:'Nunito',sans-serif; overflow:hidden;">

  <!-- Header -->
  <header style="padding:40px 20px; position:relative; overflow:hidden; flex-shrink:0; background:linear-gradient(135deg,#3DBFB8,#2A9A95);">
    <div style="position:absolute; top:-24px; right:-24px; width:96px; height:96px; border-radius:50%; opacity:.2; background:#fff;"></div>
    <div style="position:absolute; bottom:-24px; left:-24px; width:80px; height:80px; border-radius:50%; opacity:.1; background:#fff;"></div>
    <p style="position:relative; margin:0 0 16px; color:rgba(255,255,255,.8); font-size:0.75rem; font-weight:600; text-transform:uppercase; letter-spacing:.06em;">Mi Perfil</p>
    <div style="position:relative; display:flex; justify-content:center;">
      <div style="position:relative;">
        <sc-if value="{{ hasPhoto }}" hint-placeholder-val="{{ false }}">
          <img src="{{ photoUrl }}" alt="Foto" style="width:96px; height:96px; border-radius:50%; object-fit:cover; border:3px solid #fff; display:block;">
        </sc-if>
        <sc-if value="{{ noPhoto }}" hint-placeholder-val="{{ true }}">
          <div style="width:96px; height:96px; border-radius:50%; display:flex; align-items:center; justify-content:center; background:rgba(255,255,255,.25); border:3px solid #fff;"><span style="font-size:2rem; font-weight:800; color:#fff;">{{ initials }}</span></div>
        </sc-if>
        <button onClick="{{ triggerPhoto }}" style="position:absolute; bottom:-4px; right:-4px; width:32px; height:32px; border-radius:50%; display:flex; align-items:center; justify-content:center; box-shadow:0 2px 6px rgba(0,0,0,.2); background:#fff; border:none; cursor:pointer;">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#3DBFB8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14.5 4h-5L7 7H4a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-3l-2.5-3z"/><circle cx="12" cy="13" r="3"/></svg>
        </button>
        <input ref="{{ fileRef }}" type="file" accept="image/*" onChange="{{ onPhoto }}" style="display:none;">
      </div>
    </div>
    <p style="position:relative; margin:12px 0 0; color:#fff; text-align:center; font-size:1rem; font-weight:800;">{{ fullName }}</p>
    <p style="position:relative; margin:0; color:rgba(255,255,255,.7); text-align:center; font-size:0.75rem;">{{ email }}</p>
  </header>

  <!-- Form -->
  <div class="sl-scroll" style="flex:1; overflow-y:auto; padding:20px; display:flex; flex-direction:column; gap:16px;">

    <sc-if value="{{ saved }}" hint-placeholder-val="{{ false }}">
      <div style="display:flex; align-items:center; gap:10px; padding:12px; border-radius:12px; background:#F0FFF8; border:1px solid #C6F6D5;">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#38A169" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21.801 10A10 10 0 1 1 17 3.335"/><path d="m9 11 3 3L22 4"/></svg>
        <p style="margin:0; font-size:0.78rem; font-weight:600; color:#276749;">Perfil actualizado correctamente</p>
      </div>
    </sc-if>

    <p style="margin:4px 0 -4px; font-size:0.68rem; font-weight:700; color:#3DBFB8; text-transform:uppercase; letter-spacing:.07em;">Información personal</p>
    <div><p style="margin:0 0 6px; font-size:0.78rem; font-weight:700; color:#1A3A38;">Nombre</p>
      <div style="position:relative; display:flex; align-items:center;">
        <span style="position:absolute; left:14px; pointer-events:none; display:flex;"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#717182" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg></span>
        <input value="{{ name }}" onChange="{{ onName }}" placeholder="Tu nombre" style="width:100%; padding:12px 16px 12px 40px; border-radius:12px; outline:none; font-size:0.82rem; color:#1A3A38; border:1.5px solid #3DBFB8; background:#fff;">
      </div>
    </div>
    <div><p style="margin:0 0 6px; font-size:0.78rem; font-weight:700; color:#1A3A38;">Apellido</p>
      <div style="position:relative; display:flex; align-items:center;">
        <span style="position:absolute; left:14px; pointer-events:none; display:flex;"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#717182" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg></span>
        <input value="{{ lastname }}" onChange="{{ onLastname }}" placeholder="Tu apellido" style="width:100%; padding:12px 16px 12px 40px; border-radius:12px; outline:none; font-size:0.82rem; color:#1A3A38; border:1.5px solid #3DBFB8; background:#fff;">
      </div>
    </div>

    <p style="margin:4px 0 -4px; font-size:0.68rem; font-weight:700; color:#3DBFB8; text-transform:uppercase; letter-spacing:.07em;">Contacto</p>
    <div><p style="margin:0 0 6px; font-size:0.78rem; font-weight:700; color:#1A3A38;">Correo electrónico</p>
      <div style="position:relative; display:flex; align-items:center;">
        <span style="position:absolute; left:14px; pointer-events:none; display:flex;"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#717182" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="20" height="16" x="2" y="4" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg></span>
        <input type="email" value="{{ email }}" onChange="{{ onEmail }}" placeholder="correo@ejemplo.com" style="width:100%; padding:12px 16px 12px 40px; border-radius:12px; outline:none; font-size:0.82rem; color:#1A3A38; border:1.5px solid #3DBFB8; background:#fff;">
      </div>
    </div>
    <div><p style="margin:0 0 6px; font-size:0.78rem; font-weight:700; color:#1A3A38;">Teléfono</p>
      <div style="position:relative; display:flex; align-items:center;">
        <span style="position:absolute; left:14px; pointer-events:none; display:flex;"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#717182" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/></svg></span>
        <input type="tel" value="{{ phone }}" onChange="{{ onPhone }}" placeholder="+502 1234 5678" style="width:100%; padding:12px 16px 12px 40px; border-radius:12px; outline:none; font-size:0.82rem; color:#1A3A38; border:1.5px solid #3DBFB8; background:#fff;">
      </div>
    </div>

    <p style="margin:4px 0 -4px; font-size:0.68rem; font-weight:700; color:#3DBFB8; text-transform:uppercase; letter-spacing:.07em;">Institución</p>
    <div><p style="margin:0 0 6px; font-size:0.78rem; font-weight:700; color:#1A3A38;">Colegio / Ubicación</p>
      <div style="position:relative;">
        <span style="position:absolute; left:14px; top:50%; transform:translateY(-50%); pointer-events:none; display:flex;"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#717182" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 10c0 4.993-5.539 10.193-7.399 11.799a1 1 0 0 1-1.202 0C9.539 20.193 4 14.993 4 10a8 8 0 0 1 16 0"/><circle cx="12" cy="10" r="3"/></svg></span>
        <select value="{{ school }}" onChange="{{ onSchool }}" style="width:100%; padding:12px 16px 12px 36px; border-radius:12px; appearance:none; -webkit-appearance:none; outline:none; font-size:0.82rem; color:#1A3A38; border:1.5px solid #3DBFB8; background:#fff;">
          <sc-for list="{{ schools }}" as="s" hint-placeholder-count="0"><option value="{{ s }}">{{ s }}</option></sc-for>
        </select>
      </div>
    </div>

    <button class="sl-press2" onClick="{{ handleSave }}" style="width:100%; padding:14px; border-radius:12px; color:#fff; border:none; margin-top:4px; font-size:0.88rem; font-weight:700; cursor:pointer; background:linear-gradient(90deg,#3DBFB8,#2A9A95);">Guardar cambios</button>
    <button class="sl-press2" onClick="{{ logout }}" style="width:100%; padding:12px; border-radius:12px; display:flex; align-items:center; justify-content:center; gap:8px; cursor:pointer; border:1.5px solid #FEB2B2; color:#C53030; background:#FFF5F5; font-size:0.85rem; font-weight:700;">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" x2="9" y1="12" y2="12"/></svg>
      Cerrar sesión
    </button>
    <div style="height:8px;"></div>
  </div>

  <!-- Bottom Nav -->
  <div style="padding:12px 16px 28px; display:flex; gap:12px; background:#fff; flex-shrink:0; border-top:1px solid #E4F4F3;">
    <button class="sl-press" onClick="{{ goHome }}" style="flex:1; padding:12px; border-radius:16px; display:flex; flex-direction:column; align-items:center; gap:4px; cursor:pointer; background:#E6F8F7; border:1.5px solid rgba(61,191,184,.2);">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#3DBFB8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><path d="M9 22V12h6v10"/></svg>
      <span style="font-size:0.65rem; font-weight:700; color:#1A3A38;">Inicio</span>
    </button>
    <button class="sl-press" onClick="{{ goFaq }}" style="flex:1; padding:12px; border-radius:16px; display:flex; flex-direction:column; align-items:center; gap:4px; cursor:pointer; background:#E6F8F7; border:1.5px solid rgba(61,191,184,.2);">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#3DBFB8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><path d="M12 17h.01"/></svg>
      <span style="font-size:0.65rem; font-weight:700; color:#1A3A38; text-align:center; line-height:1.3;">Preguntas Frecuentes</span>
    </button>
  </div>

</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:390,&quot;height&quot;:844},&quot;navigate&quot;:{&quot;editor&quot;:null,&quot;tsType&quot;:&quot;(to: string | number) =&gt; void&quot;}}">
class Component extends DCLogic {
  state = { photo: null, name: "María Reneé", lastname: "García López", email: "maria@ejemplo.com", phone: "+502 1234 5678", school: "Colegio Americano", saved: false };
  fileRef = React.createRef();

  set(k) { return (e) => this.setState({ [k]: (e && e.target) ? e.target.value : e }); }
  onPhoto = (e) => {
    const file = e.target.files && e.target.files[0];
    if (!file) return;
    this.setState({ photo: URL.createObjectURL(file) });
  };
  handleSave = () => { this.setState({ saved: true }); setTimeout(() => this.setState({ saved: false }), 2500); };

  renderVals() {
    const nav = this.props.navigate || (() => {});
    const s = this.state;
    const schools = ["Colegio Americano", "Escuela Nacional Primaria", "Colegio La Salle", "Instituto Bilingüe", "Escuela Pública Central", "Colegio San Francisco", "Otro"];
    const initials = ((s.name.charAt(0) || "") + (s.lastname.charAt(0) || "")).toUpperCase();
    return {
      hasPhoto: !!s.photo, noPhoto: !s.photo, photoUrl: s.photo || "",
      initials, fullName: s.name + " " + s.lastname,
      name: s.name, lastname: s.lastname, email: s.email, phone: s.phone, school: s.school, schools, saved: s.saved,
      onName: this.set("name"), onLastname: this.set("lastname"), onEmail: this.set("email"), onPhone: this.set("phone"), onSchool: this.set("school"),
      onPhoto: this.onPhoto, fileRef: this.fileRef, triggerPhoto: () => this.fileRef.current && this.fileRef.current.click(),
      handleSave: this.handleSave,
      logout: () => nav("/login"), goHome: () => nav("/"), goFaq: () => nav("/faq"),
    };
  }
}
</script>
</body>
</html>
