spring:
  application:
    name: explorarte-api

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/explorarte}
    username: ${SPRING_DATASOURCE_USERNAME:explorarte}
    password: ${SPRING_DATASOURCE_PASSWORD:explorarte_dev_password}

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration

  servlet:
    multipart:
      max-file-size: 200MB
      max-request-size: 200MB

server:
  # Cloud Run injects PORT and requires the container to listen on it; local
  # dev / docker-compose don't set PORT, so this still defaults to 8000.
  port: ${PORT:8000}

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never

springdoc:
  swagger-ui:
    path: /swagger-ui.html

app:
  jwt:
    secret: ${JWT_SECRET:dev-only-not-for-production-change-me}
    expiration-minutes: ${JWT_EXPIRATION_MINUTES:1440}
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:8081,http://localhost:19006}
  seed:
    default-password: ${SEED_USER_PASSWORD:explorarte123}
  supabase:
    url: ${SUPABASE_URL:}
    # Either the service_role key (recommended, bypasses RLS) or the anon key
    # (needs a storage RLS policy allowing uploads). See render.yaml.
    key: ${SUPABASE_KEY:}
